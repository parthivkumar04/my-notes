<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f6f8; 
            color: #333; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 50px 20px; 
        }
        h1 { 
            text-align: center; 
            font-size: 2.5rem; 
            margin-bottom: 40px; 
            color: #111; 
        }
        .notes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .note-card { 
            background: #ffffff; 
            border-radius: 12px; 
            padding: 25px 20px; 
            text-decoration: none; 
            color: #333; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border: 1px solid #eaeaea; 
            transition: all 0.2s ease-in-out; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
        }
        .note-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.1); 
            border-color: #0366d6; 
            color: #0366d6; 
        }
        .note-icon { 
            font-size: 3rem; 
            margin-bottom: 15px; 
        }
        .note-title { 
            font-weight: 600; 
            font-size: 1.1rem; 
            line-height: 1.4; 
        }
    </style>
</head>
<body>

    <h1>Notes</h1>

    <div class="notes-grid">
        
        <a href="pdfs/ModernAppDev1 part3.pdf" target="_blank" class="note-card">
            <span class="note-icon">📄</span>
            <span class="note-title">ModernApplicationDev 1 - Part 3</span>
        </a>

        </div>

</body>
</html>
